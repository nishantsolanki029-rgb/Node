<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDN-Powered Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 15px; margin: auto; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="card-title text-center mb-4">Account Login</h3>
            <form id="loginForm">
                <div class="mb-3">
                    <input type="email" id="email" class="form-control" required placeholder="Email address">
                </div>
                <div class="mb-3">
                    <input type="password" id="password" class="form-control" required placeholder="Password">
                </div>
                <button type="submit" class="btn btn-primary w-100" id="loginBtn">Sign In</button>
            </form>
            <div id="message" class="mt-3 text-center"></div>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('loginBtn');
        const msg = document.getElementById('message');
        
        // Visual feedback
        btn.disabled = true;
        btn.innerText = 'Authenticating...';

        // Simulate a CDN-based API call or Edge Function
        setTimeout(() => {
            const email = document.getElementById('email').value;
            
            // Success Mock
            msg.innerHTML = `<span class="text-success">Welcome back, ${email}!</span>`;
            btn.innerText = 'Success';
            btn.className = 'btn btn-success w-100';
            
            console.log("Auth handled via Edge/CDN nodes.");
        }, 1500);
    });
</script>

</body>
</html>
